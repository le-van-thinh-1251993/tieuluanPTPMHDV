<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Booking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f59e0b;
            --accent-dark: #d97706;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* ====== HEADER ====== */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a2e 100%);
            border-bottom: 1px solid var(--border);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo h1 {
            font-size: 1.3em;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 0.72em;
            color: var(--text-muted);
        }

        /* ====== NAVIGATION TABS ====== */
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px;
            border-radius: 12px;
        }

        .nav-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* ====== MAIN ====== */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        .page {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== SECTION TITLE ====== */
        .section-title {
            font-size: 1.6em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .section-subtitle {
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 0.95em;
        }

        /* ====== ROOM CARDS ====== */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .room-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-deluxe {
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
        }

        .badge-standard {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .badge-suite {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent);
        }

        .badge-vip {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        .badge-family {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }

        .room-id {
            color: var(--text-muted);
            font-size: 0.8em;
            margin-top: 12px;
        }

        .room-name {
            font-size: 1.3em;
            font-weight: 700;
            margin: 8px 0;
        }

        .room-price {
            font-size: 1.5em;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .room-price span {
            font-size: 0.5em;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
        }

        .room-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 0.85em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-available .status-dot {
            background: var(--success);
        }

        .status-booked .status-dot {
            background: var(--danger);
            animation: none;
        }

        .status-available {
            color: var(--success);
        }

        .status-booked {
            color: var(--danger);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .btn-book {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-book-available {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-book-available:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-book-disabled {
            background: var(--bg-card-hover);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* ====== FILTER BAR ====== */
        .date-filter-bar {
            margin-bottom: 16px;
        }

        .date-filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 18px;
            display: inline-flex;
        }

        .date-filter-group label {
            font-size: 0.88em;
            font-weight: 500;
            color: var(--text-muted);
        }

        .date-filter-group input[type="date"] {
            padding: 8px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.88em;
        }

        .date-filter-group input[type="date"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .date-clear-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .date-clear-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text);
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.82em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary-light);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* ====== BOOKING FORM ====== */
        .booking-form-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85em;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ====== BOOKINGS TABLE ====== */
        .bookings-table-wrap {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .bookings-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
        }

        .bookings-table th {
            padding: 14px 18px;
            text-align: left;
            font-size: 0.78em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
        }

        .bookings-table td {
            padding: 14px 18px;
            font-size: 0.9em;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .bookings-table tr:last-child td {
            border-bottom: none;
        }

        .bookings-table tr:hover td {
            background: rgba(99, 102, 241, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-confirmed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* ====== VIEW TOGGLE TABS ====== */
        .view-toggle {
            display: flex;
            gap: 4px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: inline-flex;
        }

        .view-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.85em;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .view-tab:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .view-tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        /* ====== INVOICE CARDS ====== */
        .booked-rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .invoice-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .invoice-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.15);
            border-color: var(--primary);
        }

        .invoice-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .invoice-header h4 {
            font-size: 1em;
            color: white;
        }

        .invoice-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .invoice-body {
            padding: 20px;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            font-size: 0.9em;
        }

        .invoice-row:last-child {
            border-bottom: none;
        }

        .invoice-label {
            color: var(--text-muted);
        }

        .invoice-value {
            font-weight: 500;
            text-align: right;
        }

        .invoice-total {
            display: flex;
            justify-content: space-between;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
        }

        .invoice-total .label {
            font-weight: 600;
            font-size: 0.95em;
        }

        .invoice-total .amount {
            font-weight: 800;
            font-size: 1.15em;
            color: var(--accent);
        }

        /* ====== MODAL ====== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .modal-icon.success {
            background: rgba(16, 185, 129, 0.15);
        }

        .modal-icon.error {
            background: rgba(239, 68, 68, 0.15);
        }

        .modal h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .modal p {
            color: var(--text-muted);
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .modal .detail {
            font-weight: 600;
            color: var(--text);
        }

        .modal-close {
            margin-top: 24px;
            padding: 10px 32px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--bg-card-hover);
        }

        /* ====== LOADING ====== */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ====== STATS BAR ====== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }

        .stat-label {
            font-size: 0.78em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 800;
            margin-top: 4px;
        }

        .stat-value.text-primary {
            color: var(--primary-light);
        }

        .stat-value.text-success {
            color: var(--success);
        }

        .stat-value.text-danger {
            color: var(--danger);
        }

        .stat-value.text-accent {
            color: var(--accent);
        }

        /* ====== TOAST ====== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 500;
            z-index: 300;
            animation: toastIn 0.4s ease;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            background: var(--success);
            color: white;
        }

        .toast.error {
            background: var(--danger);
            color: white;
        }

        @keyframes toastIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 12px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🏨</div>
                <div>
                    <h1>Hotel Booking</h1>
                    <p>RESTful Web Service System</p>
                </div>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showPage('rooms')">🏠 Phòng</button>
                <button class="nav-tab" onclick="showPage('booking')">📝 Đặt phòng</button>
                <button class="nav-tab" onclick="showPage('bookings')">📋 Bookings</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- ===== PAGE: ROOMS ===== -->
        <div id="page-rooms" class="page active">
            <h2 class="section-title">Danh sách phòng</h2>
            <p class="section-subtitle">Chọn phòng phù hợp với nhu cầu của bạn</p>

            <!-- Stats -->
            <div class="stats-bar" id="room-stats"></div>

            <!-- Date Filter -->
            <div class="date-filter-bar">
                <div class="date-filter-group">
                    <label>📅 Lọc theo ngày check-in:</label>
                    <input type="date" id="filterDate" onchange="filterByDate()">
                    <button class="date-clear-btn" onclick="clearDateFilter()">✖ Xóa lọc</button>
                </div>
            </div>

            <!-- Filter -->
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterRooms('all', this)">Tất cả</button>
                <button class="filter-btn" onclick="filterRooms('Deluxe', this)">Deluxe</button>
                <button class="filter-btn" onclick="filterRooms('Standard', this)">Standard</button>
                <button class="filter-btn" onclick="filterRooms('Suite', this)">Suite</button>
                <button class="filter-btn" onclick="filterRooms('VIP', this)">VIP</button>
                <button class="filter-btn" onclick="filterRooms('Family', this)">Family</button>
            </div>

            <!-- Room Grid -->
            <div class="rooms-grid" id="rooms-grid">
                <div class="loading">
                    <div class="spinner"></div>Đang tải dữ liệu...
                </div>
            </div>
        </div>

        <!-- ===== PAGE: BOOKING FORM ===== -->
        <div id="page-booking" class="page">
            <h2 class="section-title">Đặt phòng</h2>
            <p class="section-subtitle">Điền thông tin để đặt phòng khách sạn</p>

            <div class="booking-form-container">
                <div class="form-card">
                    <form id="booking-form" onsubmit="submitBooking(event)">
                        <div class="form-group">
                            <label>Họ và tên</label>
                            <input type="text" id="customerName" placeholder="Nguyen Van A" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" placeholder="example@gmail.com" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Chọn phòng</label>
                                <select id="roomId" required>
                                    <option value="">-- Chọn phòng --</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Số đêm</label>
                                <input type="number" id="nights" min="1" max="30" value="1" required
                                    oninput="calcCheckout()">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Ngày check-in</label>
                                <input type="date" id="checkInDate" required oninput="calcCheckout()">
                            </div>
                            <div class="form-group">
                                <label>Ngày check-out (tự tính)</label>
                                <input type="date" id="checkOutDate" readonly>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Số thẻ thanh toán</label>
                                <input type="text" id="cardNumber" placeholder="12345678" required minlength="4"
                                    maxlength="19">
                            </div>
                            <div class="form-group">
                                <label>Ngân hàng</label>
                                <input type="text" id="bankName" placeholder="Vietcombank" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Tổng tiền (VND)</label>
                                <input type="number" id="amount" readonly>
                            </div>
                        </div>
                        <button type="submit" class="btn-submit" id="btn-submit">
                            Xác nhận đặt phòng
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ===== PAGE: BOOKINGS LIST ===== -->
        <div id="page-bookings" class="page">
            <h2 class="section-title">Quản lý Booking</h2>
            <p class="section-subtitle">Xem danh sách đặt phòng và hóa đơn chi tiết</p>

            <!-- Toggle Tabs -->
            <div class="view-toggle">
                <button class="view-tab active" onclick="switchBookingView('list', this)">📋 Danh sách Booking</button>
                <button class="view-tab" onclick="switchBookingView('invoices', this)">🧾 Phòng đã đặt & Hóa
                    đơn</button>
            </div>

            <!-- View 1: Table -->
            <div id="view-list">
                <div class="bookings-table-wrap" id="bookings-table-wrap">
                    <div class="loading">
                        <div class="spinner"></div>Đang tải dữ liệu...
                    </div>
                </div>
            </div>

            <!-- View 2: Invoice Cards -->
            <div id="view-invoices" style="display:none;">
                <div class="booked-rooms-grid" id="booked-rooms-grid">
                    <div class="loading">
                        <div class="spinner"></div>Đang tải dữ liệu...
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-icon" id="modal-icon">✅</div>
            <h3 id="modal-title">Thành công!</h3>
            <div id="modal-body"></div>
            <button class="modal-close" onclick="closeModal()">Đóng</button>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = './api';
        let allRooms = [];
        let allRoomsFull = [];
        let allBookingsForFilter = [];
        let currentDateFilter = '';
        let currentTypeFilter = 'all';

        // ====== NAVIGATION ======
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            event.target.classList.add('active');

            if (page === 'rooms') loadRooms();
            if (page === 'booking') loadRoomOptions();
            if (page === 'bookings') loadBookings();
        }

        // ====== ROOMS ======
        async function loadRooms() {
            try {
                const checkDate = currentDateFilter;
                const roomsUrl = checkDate
                    ? `${API_BASE}/rooms?checkInDate=${checkDate}&checkOutDate=${checkDate}`
                    : `${API_BASE}/rooms`;
                const [roomsRes, bookingsRes, allRoomsRes] = await Promise.all([
                    fetch(roomsUrl),
                    fetch(API_BASE + '/bookings'),
                    fetch(API_BASE + '/rooms')
                ]);
                allRooms = await roomsRes.json();
                allRoomsFull = await allRoomsRes.json();
                allBookingsForFilter = await bookingsRes.json();
                applyFilters();
            } catch (e) {
                document.getElementById('rooms-grid').innerHTML =
                    '<p style="color:var(--danger)">❌ Không thể kết nối API. Hãy chắc chắn server đang chạy.</p>';
            }
        }

        function renderRooms(rooms, bookedRoomIds) {
            bookedRoomIds = bookedRoomIds || [];
            const grid = document.getElementById('rooms-grid');
            if (rooms.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted)">Không tìm thấy phòng nào.</p>';
                return;
            }
            grid.innerHTML = rooms.map(room => {
                const isBookedOnDate = bookedRoomIds.includes(room.id);
                const isAvailable = !isBookedOnDate;
                const badgeClass = 'badge-' + room.type.toLowerCase();
                const statusText = isBookedOnDate ? 'Đã đặt ngày này' : 'Còn trống';
                const statusClass = isAvailable ? 'status-available' : 'status-booked';
                return `
                    <div class="room-card">
                        <span class="room-type-badge ${badgeClass}">${room.type}</span>
                        <p class="room-id">Mã phòng: ${room.id}</p>
                        <p class="room-name">Phòng ${room.type}</p>
                        <p class="room-price">${formatPrice(room.price)} <span>VND/đêm</span></p>
                        <div class="room-status ${statusClass}">
                            <span class="status-dot"></span>
                            ${statusText}
                        </div>
                        ${isAvailable ? `
                            <button class="btn-book btn-book-available" onclick="goBookRoom('${room.id}')">
                                🔑 Đặt phòng này
                            </button>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function renderStats(rooms, bookedRoomIds) {
            bookedRoomIds = bookedRoomIds || [];
            const baseRooms = allRoomsFull.length ? allRoomsFull : rooms;
            const total = baseRooms.length;
            const bookedCount = bookedRoomIds.length;
            const availableCount = Math.max(0, total - bookedCount);
            const avgPrice = baseRooms.length > 0
                ? Math.round(baseRooms.reduce((s, r) => s + r.price, 0) / baseRooms.length)
                : 0;

            document.getElementById('room-stats').innerHTML = `
                <div class="stat-card">
                    <p class="stat-label">Tổng phòng</p>
                    <p class="stat-value text-primary">${total}</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Còn trống</p>
                    <p class="stat-value text-success">${availableCount}</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Đã đặt</p>
                    <p class="stat-value text-danger">${bookedCount}</p>
                </div>
                <div class="stat-card">
                    <p class="stat-label">Giá trung bình</p>
                    <p class="stat-value text-accent">${formatPrice(avgPrice)}</p>
                </div>
            `;
        }

        function filterRooms(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTypeFilter = type;
            applyFilters();
        }

        // ====== DATE FILTER ======
        function filterByDate() {
            currentDateFilter = document.getElementById('filterDate').value;
            loadRooms();
        }

        function clearDateFilter() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filterDate').value = today;
            currentDateFilter = today;
            loadRooms();
        }

        function applyFilters() {
            let filtered = currentTypeFilter === 'all' ? allRooms : allRooms.filter(r => r.type === currentTypeFilter);

            // Find rooms booked on the selected date (range overlap check)
            let bookedRoomIds = [];
            if (currentDateFilter) {
                allBookingsForFilter.forEach(b => {
                    if (b.status !== 'confirmed') return;
                    const bIn = b.checkInDate;
                    const bOut = b.checkOutDate || b.checkInDate;
                    if (currentDateFilter >= bIn && currentDateFilter < bOut) {
                        if (!bookedRoomIds.includes(b.roomId)) bookedRoomIds.push(b.roomId);
                    }
                });
            }

            renderRooms(filtered, bookedRoomIds);
            renderStats(allRooms, bookedRoomIds);
        }

        // ====== BOOKING FORM ======
        function goBookRoom(roomId) {
            // Switch to booking page
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-booking').classList.add('active');
            document.querySelectorAll('.nav-tab')[1].classList.add('active');

            loadRoomOptions().then(() => {
                // Pre-select the room if roomId is provided
                if (roomId) {
                    document.getElementById('roomId').value = roomId;
                }
                updatePrice(); // Update price after setting room
            });
        }

        async function loadRoomOptions() {
            try {
                let checkIn = document.getElementById('checkInDate').value;
                if (!checkIn) {
                    checkIn = new Date().toISOString().split('T')[0];
                }
                const res = await fetch(API_BASE + '/rooms?checkInDate=' + checkIn);
                const rooms = await res.json();
                const select = document.getElementById('roomId');
                const currentVal = select.value;
                select.innerHTML = '<option value="">-- Chọn phòng --</option>';
                rooms.forEach(room => {
                    select.innerHTML += `<option value="${room.id}" data-price="${room.price}">
                        ${room.id} - ${room.type} (${formatPrice(room.price)} VND/đêm)
                    </option>`;
                });
                if (currentVal) select.value = currentVal;
                updatePrice();
            } catch (e) {
                console.error('Error loading rooms:', e);
            }
        }

        function updatePrice() {
            const select = document.getElementById('roomId');
            const option = select.options[select.selectedIndex];
            const pricePerNight = option ? parseFloat(option.getAttribute('data-price')) : 0;
            const nights = parseInt(document.getElementById('nights').value) || 1;
            document.getElementById('amount').value = pricePerNight ? pricePerNight * nights : '';
        }

        function calcCheckout() {
            const checkIn = document.getElementById('checkInDate').value;
            const nights = parseInt(document.getElementById('nights').value) || 1;
            if (checkIn) {
                const d = new Date(checkIn);
                d.setDate(d.getDate() + nights);
                document.getElementById('checkOutDate').value = d.toISOString().split('T')[0];
            }
            updatePrice();
        }

        document.getElementById('roomId').addEventListener('change', updatePrice);
        document.getElementById('nights').addEventListener('input', calcCheckout);

        async function submitBooking(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = '⏳ Đang xử lý...';

            const nights = parseInt(document.getElementById('nights').value) || 1;
            const body = {
                customerName: document.getElementById('customerName').value,
                email: document.getElementById('email').value,
                roomId: document.getElementById('roomId').value,
                checkInDate: document.getElementById('checkInDate').value,
                checkOutDate: document.getElementById('checkOutDate').value,
                nights: nights,
                paymentInfo: {
                    cardNumber: document.getElementById('cardNumber').value,
                    bankName: document.getElementById('bankName').value,
                    amount: parseFloat(document.getElementById('amount').value)
                }
            };

            if (!body.roomId) {
                showModal('error', 'Thiếu thông tin', '<p>Vui lòng chọn phòng.</p>');
                btn.disabled = false; btn.textContent = 'Xác nhận đặt phòng'; return;
            }
            if (!body.paymentInfo.amount || body.paymentInfo.amount <= 0) {
                showModal('error', 'Số tiền không hợp lệ', '<p>Kiểm tra lại số đêm hoặc giá phòng.</p>');
                btn.disabled = false; btn.textContent = 'Xác nhận đặt phòng'; return;
            }
            if (!body.paymentInfo.cardNumber || body.paymentInfo.cardNumber.length < 4) {
                showModal('error', 'Số thẻ không hợp lệ', '<p>Số thẻ tối thiểu 4 ký tự.</p>');
                btn.disabled = false; btn.textContent = 'Xác nhận đặt phòng'; return;
            }
            if (!body.paymentInfo.bankName) {
                showModal('error', 'Thiếu ngân hàng', '<p>Vui lòng nhập tên ngân hàng.</p>');
                btn.disabled = false; btn.textContent = 'Xác nhận đặt phòng'; return;
            }

            try {
                const res = await fetch(API_BASE + '/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    // Tìm thông tin phòng đã đặt
                    const bookedRoom = allRooms.find(r => r.id === body.roomId);
                    const roomType = bookedRoom ? bookedRoom.type : body.roomId;

                    showModal('success', 'Đặt phòng thành công! 🎉', `
                        <div style="text-align:left; background:rgba(0,0,0,0.2); border-radius:12px; padding:16px; margin:12px 0;">
                            <p style="margin-bottom:8px;"><strong>📋 Mã booking:</strong> <span style="color:#818cf8">${data.bookingId}</span></p>
                            <p style="margin-bottom:8px;"><strong>👤 Khách hàng:</strong> ${body.customerName}</p>
                            <p style="margin-bottom:8px;"><strong>📧 Email:</strong> ${body.email}</p>
                            <p style="margin-bottom:8px;"><strong>🏠 Phòng:</strong> ${body.roomId} - ${roomType}</p>
                            <p style="margin-bottom:8px;"><strong>📅 Check-in:</strong> ${body.checkInDate}</p>
                            <p style="margin-bottom:8px;"><strong>📅 Check-out:</strong> ${body.checkOutDate} (${body.nights} đêm)</p>
                            <hr style="border-color:rgba(255,255,255,0.1); margin:10px 0;">
                            <p style="margin-bottom:8px;"><strong>💳 Thanh toán:</strong> <span style="color:#10b981;">✅ Thành công</span></p>
                            <p style="margin-bottom:8px;"><strong>🔢 Số thẻ:</strong> ****${body.paymentInfo.cardNumber.slice(-4)}</p>
                            <p><strong>💰 Số tiền:</strong> <span style="color:#f59e0b; font-size:1.1em;">${formatPrice(body.paymentInfo.amount)} VND</span></p>
                        </div>
                    `);
                    document.getElementById('booking-form').reset();

                    // Refresh danh sách phòng để cập nhật trạng thái
                    await loadRooms();
                    // Refresh dropdown phòng
                    await loadRoomOptions();
                } else {
                    showModal('error', 'Đặt phòng thất bại ❌', `
                        <p style="color:var(--danger); margin:12px 0;">${data.message || 'Có lỗi xảy ra'}</p>
                    `);
                }
            } catch (e) {
                showModal('error', 'Lỗi kết nối ❌', `
                    <p style="margin:12px 0;">Không thể kết nối tới server</p>
                    <p style="color:var(--text-muted);">Hãy kiểm tra GlassFish đang chạy.</p>
                `);
            }

            btn.disabled = false;
            btn.textContent = 'Xác nhận đặt phòng';
        }

        // ====== BOOKINGS LIST ======
        let allBookings = [];

        async function loadBookings() {
            try {
                let checkIn = document.getElementById('checkInDate') ? document.getElementById('checkInDate').value : '';
                if (!checkIn) {
                    checkIn = new Date().toISOString().split('T')[0];
                }
                const [bookingsRes, roomsRes] = await Promise.all([
                    fetch(API_BASE + '/bookings'),
                    fetch(API_BASE + '/rooms?checkInDate=' + checkIn)
                ]);
                allBookings = await bookingsRes.json();
                const rooms = await roomsRes.json();
                renderBookings(allBookings);
                renderBookedRoomCards(allBookings, rooms);
            } catch (e) {
                document.getElementById('bookings-table-wrap').innerHTML =
                    '<p style="padding:20px;color:var(--danger)">❌ Không thể tải dữ liệu booking.</p>';
            }
        }

        function renderBookings(bookings) {
            if (bookings.length === 0) {
                document.getElementById('bookings-table-wrap').innerHTML =
                    '<p style="padding:20px;color:var(--text-muted)">Chưa có booking nào.</p>';
                return;
            }
            document.getElementById('bookings-table-wrap').innerHTML = `
                <table class="bookings-table">
                    <thead>
                        <tr>
                            <th>Mã Booking</th>
                            <th>Khách hàng</th>
                            <th>Email</th>
                            <th>Phòng</th>
                            <th>Check-in</th>
                            <th>Số tiền</th>
                            <th>Đã thanh toán</th>
                            <th>TT thanh toán</th>
                            <th>Ngân hàng</th>
                            <th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${bookings.map(b => `
                            <tr>
                                <td><strong>${b.id}</strong></td>
                                <td>${b.customerName}</td>
                                <td>${b.email}</td>
                                <td>${b.roomId}</td>
                                <td>${b.checkInDate}</td>
                                <td><strong>${formatPrice(b.amount)}</strong> VND</td>
                                <td>${formatPrice(b.paidAmount || b.amount)} VND</td>
                                <td><span class="status-badge status-${b.paymentStatus || 'unknown'}">${b.paymentStatus || 'unknown'}</span></td>
                                <td>${b.bankName || ''}</td>
                                <td><span class="status-badge status-${b.status}">${b.status}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // ====== BOOKED ROOMS + INVOICES ======
        function renderBookedRoomCards(bookings, rooms) {
            const grid = document.getElementById('booked-rooms-grid');
            if (bookings.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted)">Chưa có phòng nào được đặt.</p>';
                return;
            }

            grid.innerHTML = bookings.map(b => {
                const room = rooms.find(r => r.id === b.roomId) || {};
                const roomType = room.type || 'N/A';
                const badgeClass = room.type ? 'badge-' + room.type.toLowerCase() : '';

                return `
                    <div class="invoice-card">
                        <div class="invoice-header">
                            <h4>🧾 ${b.id}</h4>
                            <span class="invoice-badge">${b.status === 'confirmed' ? '✅ Confirmed' : b.status}</span>
                        </div>
                        <div class="invoice-body">
                            <div class="invoice-row">
                                <span class="invoice-label">🏠 Phòng</span>
                                <span class="invoice-value">${b.roomId} - <span class="room-type-badge ${badgeClass}" style="font-size:0.85em;">${roomType}</span></span>
                            </div>
                            <div class="invoice-row">
                                <span class="invoice-label">👤 Khách hàng</span>
                                <span class="invoice-value">${b.customerName}</span>
                            </div>
                            <div class="invoice-row">
                                <span class="invoice-label">📧 Email</span>
                                <span class="invoice-value">${b.email}</span>
                            </div>
                            <div class="invoice-row">
                                <span class="invoice-label">📅 Check-in</span>
                                <span class="invoice-value">${b.checkInDate}</span>
                            </div>
                            <div class="invoice-row">
                                <span class="invoice-label">💳 Thanh toán</span>
                                <span class="invoice-value" style="color:${b.paymentStatus === 'success' ? 'var(--success)' : 'var(--danger)'};">${b.paymentStatus || 'unknown'}</span>
                            </div>
                            <div class="invoice-row">
                                <span class="invoice-label">🏦 Ngân hàng</span>
                                <span class="invoice-value">${b.bankName || ''}</span>
                            </div>
                            ${room.price ? `<div class="invoice-row">
                                <span class="invoice-label">💲 Giá phòng/đêm</span>
                                <span class="invoice-value">${formatPrice(room.price)} VND</span>
                            </div>` : ''}
                        </div>
                        <div class="invoice-total">
                            <span class="label">💰 Tổng hóa đơn</span>
                            <span class="amount">${formatPrice(b.paidAmount || b.amount)} VND</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ====== TOGGLE VIEWS ======
        function switchBookingView(view, btn) {
            document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('view-list').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('view-invoices').style.display = view === 'invoices' ? 'block' : 'none';
        }

        // ====== MODAL ======
        function showModal(type, title, bodyHTML) {
            document.getElementById('modal-icon').className = 'modal-icon ' + type;
            document.getElementById('modal-icon').textContent = type === 'success' ? '✅' : '❌';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = bodyHTML;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // ====== TOAST ======
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // ====== UTILS ======
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN').format(price);
        }

        // ====== INIT ======
        document.addEventListener('DOMContentLoaded', () => {
            // Set default filter date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('filterDate').value = today;
            currentDateFilter = today;

            loadRooms();

            // Set default check-in date to today
            document.getElementById('checkInDate').value = today;
            calcCheckout();
        });
    </script>
</body>

</html>
